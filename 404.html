<!DOCTYPE html>
<!-- SPAフォールバック: GitHub Pagesは存在しないパス(/active 等)へのアクセス/リロード時にこの404.htmlを返す。
     中身はindex.htmlと同一で、SPAが起動し location.pathname を読んで該当画面を描画する。
     ★index.htmlを変更したら、このファイルも必ず同じ内容に更新すること（内容ドリフト防止）。 -->
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<!-- ルーティングのベースパスを自動判定（GitHub Pagesのサブパス /demo_rental/ とローカル / の両対応）。
     相対URL(styles.css / *.js)がネストしたパスでも正しく解決されるよう <base> を先頭で注入する。 -->
<script>(function(){var b=location.hostname.indexOf('github.io')>=0?'/'+(location.pathname.split('/')[1]||'')+'/':'/';window.__BASE=b;document.write('<base href="'+b+'">');})();</script>
<title>デモ機貸出管理</title>
<link rel="icon" href="favicon.svg" type="image/svg+xml">
<meta name="theme-color" content="#6366f1">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
<!-- Google Identity Services -->
<script src="https://accounts.google.com/gsi/client" async defer></script>
</head>
<body>

<!-- ログインゲート（組織のGoogleアカウントでログイン） -->
<div id="login">
  <div class="login-card">
    <div class="brand" style="justify-content:center;font-size:18px"><span class="mk"><svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M12 3 20 7v10l-8 4-8-4V7l8-4Z"/><path d="M12 3v18M4 7l8 4 8-4"/></svg></span>デモ機貸出管理</div>
    <p class="login-note">Googleアカウントでログインしてください。</p>
    <div id="gbtn" style="display:flex;justify-content:center"></div>
    <div id="login-msg" class="login-msg"></div>
  </div>
</div>

<!-- アプリ本体（ログイン後に表示） -->
<div id="app" style="display:none">
<header class="top">
  <span class="brand"><span class="mk"><svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M12 3 20 7v10l-8 4-8-4V7l8-4Z"/><path d="M12 3v18M4 7l8 4 8-4"/></svg></span>デモ機管理</span><span class="spacer"></span>
  <span class="who-h" id="whoH"></span>
  <button class="primary" id="btnNew" onclick="openNew()">＋ 新規貸出</button>
</header>
<div class="layout"><aside class="left"><nav class="menu" id="menu"></nav><div class="subpane" id="subpane" style="display:none"></div></aside><main class="right" id="main"></main></div>
</div>

<div class="loading" id="loading" style="display:none">読み込み中…</div>
<div id="busy"><div class="bx"><div class="spin"></div>処理中…</div></div>
<div id="tip"></div>
<div class="overlay" id="overlay" onclick="closePanel()"></div>
<aside class="panel" id="panel"><div class="ph"><h3 id="panelTitle">詳細</h3><button class="x" onclick="closePanel()">✕</button></div><div class="pb" id="panelBody"></div><div class="pactions" id="panelActions"></div></aside>
<div class="modal" id="newModal"><div class="mwrap" style="width:900px"><button class="modalx" onclick="cls('newModal')" title="閉じる">✕</button><div class="mcard" id="newCard" style="width:100%"></div></div></div>
<div class="modal" id="discardModal"><div class="mcard" id="discardCard" style="width:480px"></div></div>
<div class="modal" id="extModal"><div class="mcard" id="extCard" style="width:480px"></div></div>
<div class="modal" id="retModal"><div class="mcard" id="retCard" style="width:460px"></div></div>
<div class="modal" id="caseModal"><div class="mcard" id="caseCard"></div></div>
<div class="modal" id="empyoModal"><div class="mwrap" style="width:720px"><div class="noprint" style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px"><h3 style="margin:0">伝票プレビュー</h3><div><button class="btn" onclick="cls('empyoModal')">閉じる</button> <button class="btn primary" onclick="printEmpyo()">印刷 / PDF</button></div></div><div class="noprint" style="margin-bottom:10px"><input id="empyoExtra" placeholder="帳票に追記（例：マウント・カタログ同梱）" oninput="empyoExtra=this.value;renderEmpyo()" style="width:100%;padding:8px 11px;border:1px solid var(--line);border-radius:9px;font-size:13px;font-family:inherit"></div><div id="empyoArea"></div></div></div>
<div id="printRoot"></div>

<script src="config.js"></script>
<script src="app-core.js"></script>
<script src="auth.js"></script>
</body>
</html>
